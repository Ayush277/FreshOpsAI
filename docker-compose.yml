name: freshops-ai

services:
  backend:
    image: ${BACKEND_IMAGE:-freshops-backend:local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: freshops-backend
    ports:
      - "4000:4000"
    env_file:
      - ${BACKEND_ENV_OVERRIDE:-./backend/.env}
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-freshops-frontend:local}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: freshops-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
