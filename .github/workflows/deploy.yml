name: Deploy FreshOps AI to AWS EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: freshops-ai-ec2-main
  cancel-in-progress: true

env:
  EC2_HOST: 107.22.48.62
  EC2_USER: ec2-user
  APP_DIR: /home/ec2-user/freshops-ai
  AWS_REGION: us-east-1

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/freshops-ai.pem
          chmod 600 ~/.ssh/freshops-ai.pem
          ssh-keyscan -H "${EC2_HOST}" >> ~/.ssh/known_hosts

      - name: Sync source to EC2
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'frontend/node_modules' \
            --exclude 'backend/node_modules' \
            --exclude '.env' \
            --exclude 'backend/.env' \
            -e "ssh -i ~/.ssh/freshops-ai.pem" \
            ./ "${EC2_USER}@${EC2_HOST}:${APP_DIR}/"

      - name: Upload runtime env files
        run: |
          printf '%s\n' \
            'NODE_ENV=production' \
            'PORT=4000' \
            'CORS_ORIGIN=*' \
            'MONGODB_URI=${{ secrets.MONGO_URI }}' \
            'AWS_REGION=${{ env.AWS_REGION }}' \
            'AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}' \
            'AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}' \
            'AWS_S3_BUCKET=freshops-ai-images-ayush-20260427' \
            'AWS_S3_PREFIX=freshops/uploads' \
            'CLARIFAI_PAT=${{ secrets.CLARIFAI_PAT }}' \
            'CLARIFAI_USER_ID=${{ secrets.CLARIFAI_USER_ID }}' \
            'CLARIFAI_APP_ID=${{ secrets.CLARIFAI_APP_ID }}' \
            'CLARIFAI_MODEL_ID=${{ secrets.CLARIFAI_MODEL_ID }}' \
            > "$RUNNER_TEMP/freshops-ai.env"

          scp -i ~/.ssh/freshops-ai.pem "$RUNNER_TEMP/freshops-ai.env" "${EC2_USER}@${EC2_HOST}:${APP_DIR}/.env"
          scp -i ~/.ssh/freshops-ai.pem "$RUNNER_TEMP/freshops-ai.env" "${EC2_USER}@${EC2_HOST}:${APP_DIR}/backend/.env"

      - name: Deploy to AWS server
        run: |
          ssh -i ~/.ssh/freshops-ai.pem "${EC2_USER}@${EC2_HOST}" "set -e; cd '${APP_DIR}'; if ! command -v docker >/dev/null 2>&1; then echo 'Docker is not installed on the EC2 host. Install Docker once, then re-run the workflow.'; exit 1; fi; sudo docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --remove-orphans; sudo docker compose -f docker-compose.yml -f docker-compose.prod.yml ps"

      - name: Verify deployment
        run: |
          sleep 15
          curl -f "http://${EC2_HOST}:8080" >/dev/null
          curl -f "http://${EC2_HOST}:4000/health" >/dev/null

      - name: Print deployment URL
        run: |
          echo "FreshOps AI deployed to: http://${EC2_HOST}:8080"
